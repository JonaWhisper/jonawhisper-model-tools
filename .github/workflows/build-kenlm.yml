name: Build KenLM models

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language code (e.g. 'fr', 'en'). Leave empty for all."
        required: false
        default: ""

jobs:
  matrix:
    name: Build language list
    runs-on: ubuntu-latest
    outputs:
      langs: ${{ steps.list.outputs.langs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Resolve languages
        id: list
        run: |
          if [ -n "${{ inputs.language }}" ]; then
            echo "langs=[\"${{ inputs.language }}\"]" >> "$GITHUB_OUTPUT"
          else
            echo "langs=$(cat kenlm/languages.json)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: ${{ fromJson(needs.matrix.outputs.langs) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost-all-dev \
            zlib1g-dev libbz2-dev liblzma-dev wget

      - name: Install Python dependencies
        run: pip install -r kenlm/requirements.txt

      - name: Get KenLM latest commit hash
        id: kenlm-rev
        run: echo "rev=$(git ls-remote https://github.com/kpu/kenlm.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache KenLM binaries
        id: kenlm-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/kenlm-tools
          key: kenlm-${{ runner.os }}-${{ steps.kenlm-rev.outputs.rev }}

      - name: Build KenLM from source
        if: steps.kenlm-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/kpu/kenlm.git /tmp/kenlm
          cd /tmp/kenlm
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) lmplz build_binary
          mkdir -p /usr/local/bin/kenlm-tools
          cp bin/lmplz bin/build_binary /usr/local/bin/kenlm-tools/

      - name: Install KenLM tools
        run: sudo cp /usr/local/bin/kenlm-tools/* /usr/local/bin/

      - name: "Build ${{ matrix.lang }} model"
        run: |
          cd kenlm
          ./train.sh ${{ matrix.lang }}

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd kenlm
          python upload.py "${{ matrix.lang }}.binary" "${{ matrix.lang }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kenlm-${{ matrix.lang }}
          path: kenlm/${{ matrix.lang }}.binary
          retention-days: 30
